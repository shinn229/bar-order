<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ドリンク注文（店員用）</title>
<style>
  :root{
    --ink:#2b2420;
    --paper:#faf6ef;
    --paper-dim:#f0e9db;
    --paper-card:#ffffff;
    --line:#ddd2bc;
    --accent:#b5482f;
    --accent-dark:#8c3520;
    --good:#3f7d5c;
    --warn:#c98a2c;
    --mono: 'Courier New', monospace;
    --serif: Georgia, "Hiragino Mincho ProN", "Yu Mincho", serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--paper);
    color:var(--ink);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:var(--ink);
    color:var(--paper);
    position:sticky;
    top:0;
    z-index:30;
  }
  .topbar .brand{
    font-family:var(--serif);
    font-weight:700;
    letter-spacing:0.04em;
    font-size:15px;
  }
  .topbar .right-actions{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .topbar .switch{display:flex; gap:6px;}
  .topbar button{
    background:transparent;
    color:var(--paper);
    border:1px solid rgba(250,246,239,0.4);
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
    white-space:nowrap;
  }
  .topbar button.active{background:var(--accent); border-color:var(--accent);}
  .history-btn{
    background:transparent;
    color:var(--paper);
    border:1px solid rgba(250,246,239,0.4);
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
  }

  .screen{display:none;}
  .screen.active{display:block;}

  /* ---------- Search box ---------- */
  .search-bar{
    max-width:920px;
    margin:0 auto;
    padding:12px 16px 0;
  }
  .search-input-wrap{
    position:relative;
    display:flex;
    align-items:center;
  }
  .search-input-wrap .search-icon{
    position:absolute;
    left:14px;
    font-size:15px;
    pointer-events:none;
    opacity:0.7;
  }
  .search-bar input{
    width:100%;
    padding:11px 14px 11px 40px;
    border:1px solid var(--line);
    border-radius:24px;
    font-size:14px;
    background:var(--paper-card);
    color:var(--ink);
    font-family:inherit;
  }
  .search-bar input::placeholder{color:#a99c87;}
  .search-bar input:focus{
    outline:none;
    border-color:var(--accent);
  }
  .search-empty{
    grid-column:1 / -1;
    text-align:center;
    padding:40px 20px;
    color:#a99c87;
    font-size:13px;
  }

  /* 控えめな店員用リンク（お客様にはほぼ気づかれない最下部の小リンク） */
  .staff-link-wrap{
    text-align:center;
    padding:18px 0 90px;
  }
  .staff-link{
    font-size:11px;
    color:#c3b9a6;
    text-decoration:none;
    letter-spacing:0.04em;
    border-bottom:1px dotted #d2c8b4;
    padding-bottom:1px;
  }
  .staff-link:hover{color:#a99c87;}

  /* ---------- Drink-type tabs (bookmark-tab look) ---------- */
  .drink-tabs{
    display:flex;
    gap:6px;
    padding:14px 16px 0;
    max-width:920px;
    margin:0 auto;
  }
  .drink-tab{
    flex:1;
    text-align:center;
    padding:11px 8px 10px;
    background:var(--paper-dim);
    border:1px solid var(--line);
    border-bottom:none;
    border-radius:10px 10px 0 0;
    font-size:14px;
    font-weight:700;
    color:#8a7d68;
    cursor:pointer;
    position:relative;
    top:1px;
  }
  .drink-tab.active{
    background:var(--paper-card);
    color:var(--accent-dark);
    border-color:var(--line);
  }
  .drink-tab .sub{
    display:block;
    font-size:9px;
    font-weight:400;
    letter-spacing:0.08em;
    margin-top:2px;
    text-transform:uppercase;
    opacity:0.7;
  }

  /* ---------- Customer screen layout ---------- */
  #customer{
    max-width:920px;
    margin:0 auto;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:0 0 14px 14px;
  }
  .drink-panel{display:none;}
  .drink-panel.active{display:flex;}

  .side-nav{
    width:128px;
    flex-shrink:0;
    position:sticky;
    top:48px;
    align-self:flex-start;
    padding:16px 6px;
    max-height:calc(100vh - 48px);
    overflow-y:auto;
  }
  .side-nav .nav-label{
    font-size:10px;
    color:#a99c87;
    letter-spacing:0.08em;
    margin-bottom:8px;
    padding-left:8px;
  }
  .side-nav button{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    border-left:3px solid transparent;
    padding:8px 8px;
    font-size:12.5px;
    color:var(--ink);
    cursor:pointer;
    border-radius:0 6px 6px 0;
    line-height:1.3;
  }
  .side-nav button:hover{background:var(--paper-dim);}
  .side-nav button.active{
    border-left-color:var(--accent);
    background:var(--paper-dim);
    font-weight:700;
    color:var(--accent-dark);
  }

  .menu-main{
    flex:1;
    min-width:0;
    padding:16px 14px 110px;
  }
  .cat-title{
    font-size:12.5px;
    font-weight:700;
    color:var(--accent-dark);
    letter-spacing:0.08em;
    margin:20px 0 10px;
  }
  .cat-title:first-child{margin-top:4px;}

  /* 2-column card grid */
  .menu-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .menu-card{
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
    background:var(--paper-card);
    position:relative;
  }
  .menu-card.sold-out{
    opacity:0.55;
    background:var(--paper-dim);
  }
  .menu-card .sold-out-badge{
    position:absolute;
    top:8px;
    right:8px;
    background:#8a7d68;
    color:#fff;
    font-size:10px;
    font-weight:700;
    padding:2px 8px;
    border-radius:10px;
    letter-spacing:0.05em;
  }
  .menu-card.sold-out .name{color:#8a7d68;}
  .menu-card .qty-control button:disabled{
    opacity:0.4;
    cursor:not-allowed;
  }
  .menu-card .name{
    font-size:13.5px;
    font-weight:700;
    line-height:1.3;
  }
  .menu-card .desc{
    font-size:11px;
    color:#8a7d68;
    font-style:italic;
    line-height:1.4;
    flex:1;
  }
  .menu-card .qty-control{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:2px;
  }
  .qty-control button{
    width:26px; height:26px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--paper);
    font-size:15px;
    cursor:pointer;
    line-height:1;
    flex-shrink:0;
  }
  .qty-control .qty{
    min-width:16px;
    text-align:center;
    font-size:13px;
    font-variant-numeric:tabular-nums;
  }

  .empty-panel{
    grid-column:1 / -1;
    text-align:center;
    padding:60px 20px;
    color:#a99c87;
    font-size:13px;
    line-height:1.6;
  }

  /* ---------- Cart bar ---------- */
  .cart-bar{
    position:fixed;
    bottom:0;left:0;right:0;
    background:var(--ink);
    color:var(--paper);
    padding:13px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:20;
  }
  .cart-bar .total{font-family:var(--mono); font-size:14px;}
  .cart-bar button{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 22px;
    border-radius:24px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .cart-bar button:disabled{background:#5e554a; cursor:not-allowed;}

  .toast{
    position:fixed;
    top:60px;left:50%;
    transform:translateX(-50%) translateY(-20px);
    background:var(--good);
    color:#fff;
    padding:10px 18px;
    border-radius:8px;
    font-size:13px;
    opacity:0;
    transition:all 0.3s;
    pointer-events:none;
    z-index:60;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- 全画面「注文完了」オーバーレイ ---------- */
  .order-complete{
    position:fixed;
    inset:0;
    background:rgba(43,36,32,0.12);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:200;
    opacity:0;
    visibility:hidden;
    transition:opacity 0.25s;
  }
  .order-complete.show{opacity:1; visibility:visible;}
  .order-complete .oc-inner{
    background:#8CC63F;
    color:#fff;
    padding:40px 48px;
    border-radius:22px;
    box-shadow:0 14px 44px rgba(0,0,0,0.22);
    text-align:center;
    transform:scale(0.9);
    transition:transform 0.3s cubic-bezier(0.2,0.8,0.3,1.2);
  }
  .order-complete.show .oc-inner{transform:scale(1);}
  .oc-check{
    width:96px;
    height:96px;
    margin:0 auto 20px;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
    border:3px solid #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:52px;
    line-height:1;
  }
  .oc-title{font-size:30px; font-weight:700; letter-spacing:0.06em; margin-bottom:8px;}
  .oc-sub{font-size:15px; opacity:0.9;}

  /* ---------- History modal ---------- */
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(43,36,32,0.55);
    z-index:90;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:var(--paper);
    border-radius:16px;
    max-width:420px;
    width:100%;
    max-height:80vh;
    overflow-y:auto;
    padding:18px;
  }
  .modal-box h3{margin:0 0 14px; font-size:16px;}
  .modal-close{
    float:right;
    background:transparent;
    border:none;
    font-size:18px;
    cursor:pointer;
    color:var(--ink);
  }
  .history-entry{border-bottom:1px solid var(--line); padding:12px 0;}
  .history-entry:last-child{border-bottom:none;}
  .history-entry .h-meta{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:#a99c87;
    margin-bottom:6px;
  }
  .history-entry .h-type{
    font-size:10px;
    font-weight:700;
    padding:1px 7px;
    border-radius:8px;
    background:var(--paper-dim);
    color:var(--accent-dark);
    margin-right:6px;
  }
  .history-entry .h-status{
    font-size:11px;
    font-weight:700;
    padding:2px 8px;
    border-radius:10px;
    background:var(--paper-dim);
  }
  .history-entry .h-status.cooking{color:var(--warn);}
  .history-entry .h-status.done{color:var(--good);}
  .history-entry .h-status.new{color:var(--accent-dark);}
  .history-entry ul{margin:0; padding-left:0; list-style:none; font-size:13px;}
  .history-entry li{padding:2px 0;}
  .history-empty{text-align:center; color:#a99c87; font-size:13px; padding:30px 0;}

  /* ---------- Staff screen ---------- */
  #staff{padding:18px; max-width:1100px; margin:0 auto;}
  .staff-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:16px;
  }
  .staff-header h2{margin:0; font-size:18px;}
  .staff-header .sub{font-size:12px; color:#8a7d68;}
  .columns{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .columns.columns-2{
    grid-template-columns:repeat(2,1fr);
    max-width:760px;
  }
  .col-title{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:10px;
    padding-bottom:8px;
    border-bottom:2px solid var(--line);
  }
  .col-title.new{color:var(--accent-dark);}
  .col-title.cooking{color:var(--warn);}
  .col-title.done{color:var(--good);}
  .order-card{
    background:var(--paper-dim);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
  }
  .order-card .meta{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#8a7d68;
    margin-bottom:6px;
  }
  .order-card .order-label{font-weight:700; color:var(--ink); font-size:14px;}
  .order-card ul.order-items{margin:6px 0; padding-left:0; list-style:none; font-size:13px;}
  .order-card li.order-item{
    display:block;
    padding:8px 0;
    border-top:1px solid var(--line);
  }
  .order-card li.order-item:first-child{border-top:none;}
  .order-card .item-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:8px;
  }
  .order-card .item-name{font-weight:700; font-size:14px; color:var(--ink);}
  .order-card .item-qty{font-weight:700; font-size:14px; color:var(--accent-dark); white-space:nowrap;}
  .order-card .item-type{font-size:10px; color:#a99c87; margin-right:4px; font-weight:400;}
  .order-card .recipe{
    margin-top:5px;
    padding:6px 8px;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:6px;
    font-size:11.5px;
    line-height:1.5;
  }
  .order-card .recipe-row{display:flex; gap:6px;}
  .order-card .recipe-key{
    flex-shrink:0;
    width:42px;
    color:#a99c87;
    font-weight:700;
  }
  .order-card .recipe-val{color:var(--ink); flex:1;}
  .order-card .recipe-missing{
    margin-top:5px;
    font-size:11px;
    color:#a99c87;
    font-style:italic;
  }
  .order-card .actions{margin-top:8px; display:flex; gap:6px;}
  .order-card .actions button{
    flex:1; padding:6px 0; font-size:12px; border-radius:6px;
    border:1px solid var(--line); background:var(--paper); cursor:pointer;
  }
  .order-card .actions button.primary{
    background:var(--accent); color:#fff; border-color:var(--accent);
  }
  .empty-col{
    font-size:12px; color:#a99c87; text-align:center;
    padding:24px 0; border:1px dashed var(--line); border-radius:10px;
  }
  .refresh-note{font-size:11px; color:#a99c87; margin-top:18px; text-align:center;}

  /* ---------- Staff sub-tabs & stock management ---------- */
  .staff-subtabs{
    display:flex;
    gap:6px;
    margin-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  .staff-subtab{
    background:transparent;
    border:none;
    padding:10px 16px;
    font-size:14px;
    font-weight:700;
    color:#8a7d68;
    cursor:pointer;
    border-bottom:3px solid transparent;
    margin-bottom:-1px;
  }
  .staff-subtab.active{
    color:var(--accent-dark);
    border-bottom-color:var(--accent);
  }
  .staff-section{display:none;}
  .staff-section.active{display:block;}

  .stock-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:14px 0;
    gap:12px;
    flex-wrap:wrap;
  }
  .restore-all{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink);
    padding:8px 14px;
    border-radius:8px;
    font-size:12px;
    cursor:pointer;
  }
  .restore-all:hover{background:var(--paper-dim);}

  .stock-grid{
    display:block;
  }
  .stock-group-title{
    font-size:13px;
    font-weight:700;
    color:var(--accent-dark);
    letter-spacing:0.04em;
    margin:20px 0 10px;
    padding-bottom:6px;
    border-bottom:2px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .stock-group-title:first-child{margin-top:0;}
  .stock-group-title .grp-count{
    font-size:11px;
    font-weight:400;
    color:#a99c87;
  }
  .stock-group-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:8px;
    margin-bottom:6px;
  }
  .stock-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--paper-card);
  }
  .stock-item.is-soldout{background:#f7ece8; border-color:#e3c4ba;}
  .stock-item .stock-name{font-size:13.5px; font-weight:600;}
  .stock-item .stock-name .count{
    display:block;
    font-size:10.5px;
    color:#a99c87;
    font-weight:400;
    margin-top:1px;
  }
  /* toggle switch */
  .switch-toggle{
    position:relative;
    width:46px; height:26px;
    flex-shrink:0;
    cursor:pointer;
  }
  .switch-toggle input{opacity:0; width:0; height:0;}
  .switch-track{
    position:absolute;
    inset:0;
    background:var(--good);
    border-radius:26px;
    transition:background 0.2s;
  }
  .switch-track::before{
    content:"";
    position:absolute;
    width:20px; height:20px;
    left:3px; top:3px;
    background:#fff;
    border-radius:50%;
    transition:transform 0.2s;
  }
  .switch-toggle input:checked + .switch-track{background:#c47a66;}
  .switch-toggle input:checked + .switch-track::before{transform:translateX(20px);}
  .stock-state{font-size:10px; color:#a99c87; width:42px; text-align:right; flex-shrink:0;}

  /* ---------- Mobile ---------- */
  @media (max-width: 640px){
    .topbar{padding:10px 12px;}
    .topbar .brand{font-size:13.5px;}
    .drink-tabs{padding:10px 10px 0;}
    .drink-tab{font-size:13px; padding:10px 6px 9px;}
    .drink-panel{flex-direction:column;}
    .side-nav{
      width:100%;
      position:sticky;
      top:40px;
      background:var(--paper-card);
      z-index:10;
      display:flex;
      align-items:center;
      gap:4px;
      overflow-x:auto;
      padding:8px 10px;
      border-bottom:1px solid var(--line);
      max-height:none;
    }
    .side-nav .nav-label{display:none;}
    .side-nav button{
      white-space:nowrap;
      border-left:none;
      border-bottom:3px solid transparent;
      border-radius:6px 6px 0 0;
      padding:7px 9px;
    }
    .side-nav button.active{border-left-color:transparent; border-bottom-color:var(--accent);}
    .menu-main{padding:12px 10px 100px;}
    .menu-grid{gap:8px;}
    .menu-card{padding:9px; gap:5px;}
    .menu-card .name{font-size:13px;}
    .columns{grid-template-columns:1fr; gap:12px;}
  }
</style>

  /* 店員ページはスクロールバーを常に表示 */
  body { overflow-y: scroll; }
</style>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="topbar">
  <div class="brand">ドリンク注文（店員用）</div>
</div>

<div id="staff" style="padding:18px; max-width:1100px; margin:0 auto;">
  <div class="staff-subtabs">
    <button class="staff-subtab active" data-staff-tab="orders">注文状況</button>
    <button class="staff-subtab" data-staff-tab="stock">材料管理</button>
  </div>

  <div class="staff-section active" id="staff-orders">
    <div class="staff-header">
      <div>
        <h2>注文状況</h2>
        <div class="sub" id="orderCount">読み込み中…</div>
      </div>
    </div>
    <div class="columns columns-2">
      <div>
        <div class="col-title new">未対応</div>
        <div id="col-new"></div>
      </div>
      <div>
        <div class="col-title done">完了（直近5件）</div>
        <div id="col-done"></div>
      </div>
    </div>
    <div class="refresh-note">リアルタイムで自動更新されます</div>
  </div>

  <div class="staff-section" id="staff-stock">
    <div class="staff-header">
      <div>
        <h2>材料管理</h2>
        <div class="sub">品切れにすると、その材料を使うドリンクがお客様メニューで「品切れ」表示になり注文できなくなります。</div>
      </div>
    </div>
    <div class="stock-actions">

function getDrinkIngredientIds(item){
  const recipe = RECIPES[item.name];
  if(!recipe) return [];
  const text = recipe.ingredients;
  const ids = [];
  INGREDIENTS_MASTER.forEach(ing=>{
    // notAliases（例: 「ジン」に対する「ジンジャーエール」）を先に取り除いた文字列で判定
    let scan = text;
    if(ing.notAliases){
      ing.notAliases.forEach(na=>{ scan = scan.split(na).join(''); });
    }
    if(ing.aliases.some(a=>scan.includes(a))){
      ids.push(ing.id);
    }
  });
  return ids;
}

const statusLabel = {new:'未対応', done:'完了'};
const typeLabel = {mocktail:'モクテル', cocktail:'カクテル'};

function formatTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diffSec = Math.floor((Date.now()-d.getTime())/1000);
  if(diffSec < 60) return `${diffSec}秒前`;
  return `${Math.floor(diffSec/60)}分前`;
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function setOrderStatus(orderId, status){
  try{
    await db.collection('orders').doc(orderId).update({status});
  }catch(e){ console.error('status update failed', e); }
}

function renderOrderCard(order){
  const div = document.createElement('div');
  div.className = 'order-card';

  let actionsHtml = '';
  if(order.status === 'new'){
    actionsHtml = `<button class="primary" data-action="done">完了にする</button>`;
  } else {
    actionsHtml = `<button data-action="new">未対応に戻す</button>`;
  }

  const itemsHtml = order.items.map(it=>{
    const recipe = RECIPES[it.name];
    let recipeHtml = '';
    if(recipe){
      recipeHtml = `
        <div class="recipe">
          <div class="recipe-row"><span class="recipe-key">材料</span><span class="recipe-val">${escapeHtml(recipe.ingredients)}</span></div>
          <div class="recipe-row"><span class="recipe-key">グラス</span><span class="recipe-val">${escapeHtml(recipe.glass)}　氷:${escapeHtml(recipe.ice)}　シェイク:${escapeHtml(recipe.shake)}</span></div>
        </div>`;
    } else if(it.type === 'cocktail'){
      recipeHtml = `<div class="recipe recipe-missing">レシピ未登録</div>`;
    }
    const typeBadge = typeLabel[it.type] ? `<span class="item-type">[${typeLabel[it.type]}]</span>` : '';
    return `
      <li class="order-item">
        <div class="item-head">
          <span class="item-name">${typeBadge}${escapeHtml(it.name)}</span>
          <span class="item-qty">×${it.qty}</span>
        </div>
        ${recipeHtml}
      </li>`;
  }).join('');

  div.innerHTML = `
    <div class="meta">
      <span class="order-label">${formatTime(order.createdAt)}</span>
      <span>${timeAgo(order.createdAt)}</span>
    </div>
    <ul class="order-items">${itemsHtml}</ul>
    <div class="actions">${actionsHtml}</div>
  `;
  div.querySelectorAll('.actions button').forEach(btn=>{
    btn.addEventListener('click', ()=>setOrderStatus(order.id, btn.dataset.action));
  });
  return div;
}

// Firestoreのordersコレクションをリアルタイム監視
db.collection('orders')
  .orderBy('createdAtMs', 'desc')
  .limit(50)
  .onSnapshot(snapshot=>{
    const orders = snapshot.docs.map(doc=>{return {id:doc.id, ...doc.data()}});
    const grouped = {new:[], done:[]};
    orders.forEach(o=>{
      if(o.status === 'done') grouped.done.push(o);
      else grouped.new.push(o);
    });

    const cols = {
      new: document.getElementById('col-new'),
      done: document.getElementById('col-done')
    };
    Object.values(cols).forEach(c=>c.innerHTML='');

    const doneToShow = grouped.done.slice(0,5);
    const renderList = {new: grouped.new, done: doneToShow};
    Object.keys(cols).forEach(status=>{
      const list = renderList[status];
      if(list.length === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-col';
        empty.textContent = 'なし';
        cols[status].appendChild(empty);
      } else {
        list.forEach(o=> cols[status].appendChild(renderOrderCard(o)));
      }
    });

    document.getElementById('orderCount').textContent =
      `未対応 ${grouped.new.length}件 / 完了 ${grouped.done.length}件`;
  });

/* ---------- 材料管理（Firestore） ---------- */
// 品切れ状態の読み込み（リアルタイム）
db.collection('settings').doc('sold_out').onSnapshot(snap=>{
  const ids = snap.exists ? (snap.data().ids || []) : [];
  soldOutIngredients = new Set(ids);
  renderStockGrid();
});

async function saveSoldOut(){
  try{
    await db.collection('settings').doc('sold_out').set({ids: [...soldOutIngredients]});
  }catch(e){ console.error('sold-out save failed', e); }
}

function countDrinksUsingIngredient(ingId){
  let count = 0;
  Object.keys(DRINK_CONFIG).forEach(dk=>{
    DRINK_CONFIG[dk].menu.forEach(item=>{
      if(getDrinkIngredientIds(item).includes(ingId)) count++;
    });
  });
  return count;
}

const STOCK_GROUPS = [
  {key:"cocktail", label:"カクテル（酒・リキュール）"},
  {key:"mixer",   label:"割材（ジュース・炭酸・お茶）"},
  {key:"other",   label:"その他（シロップ・薬味など）"},
];

function makeStockItem(ing){
  const usedCount = countDrinksUsingIngredient(ing.id);
  const isSoldOut = soldOutIngredients.has(ing.id);
  const row = document.createElement('div');
  row.className = 'stock-item' + (isSoldOut ? ' is-soldout' : '');
  row.innerHTML = `
    <div class="stock-name">${ing.name}<span class="count">使用ドリンク ${usedCount}種</span></div>
    <label class="switch-toggle">
      <input type="checkbox" ${isSoldOut ? 'checked' : ''}>
      <span class="switch-track"></span>
    </label>
  `;
  const checkbox = row.querySelector('input');
  checkbox.addEventListener('change', async ()=>{
    if(checkbox.checked) soldOutIngredients.add(ing.id);
    else soldOutIngredients.delete(ing.id);
    await saveSoldOut();
  });
  return row;
}

function renderStockGrid(){
  const container = document.getElementById('stockGrid');
  if(!container) return;
  container.innerHTML = '';

  STOCK_GROUPS.forEach(group=>{
    const items = INGREDIENTS_MASTER.filter(ing=>
      ing.group === group.key && countDrinksUsingIngredient(ing.id) > 0
    );
    if(items.length === 0) return;

    const heading = document.createElement('div');
    heading.className = 'stock-group-title';
    const soldCount = items.filter(i=>soldOutIngredients.has(i.id)).length;
    heading.innerHTML = `${group.label}<span class="grp-count">${items.length}種${soldCount>0?` ・ 品切れ ${soldCount}`:''}`;
    container.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'stock-group-grid';
    items.forEach(ing=> grid.appendChild(makeStockItem(ing)));
    container.appendChild(grid);
  });

  const summary = document.getElementById('stockSummary');
  if(summary){
    summary.textContent = soldOutIngredients.size > 0
      ? `現在 ${soldOutIngredients.size} 種類の材料が品切れ`
      : 'すべて在庫あり';
  }
}

document.getElementById('restoreAll').addEventListener('click', async ()=>{
  soldOutIngredients.clear();
  await saveSoldOut();
});



</script>
